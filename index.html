<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한국 기준 세계 시간</title>
    <meta
      name="description"
      content="한국 시간을 기준으로 베트남, 호주, 스웨덴, 사우디아라비아, 콜롬비아, 이집트의 현재 시간을 실시간으로 확인하세요."
    />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">KST</p>
          <h1>해외 시간</h1>
          <p class="hero-text">
            서울 시간을 기준으로 베트남, 호주, 스웨덴, 사우디아라비아, 콜롬비아, 이집트의
            현재 시간을 실시간으로 확인할 수 있습니다.
          </p>
          <div class="hero-points">
            <span>실시간 갱신</span>
            <span>시차 표시</span>
            <span>호주 시드니 기준</span>
          </div>
        </div>

        <section class="kst-panel" aria-label="한국 현재 시간">
          <div class="panel-head">
            <p class="panel-label">대한민국 서울</p>
            <div class="live-dot">LIVE</div>
          </div>
          <div id="kst-time" class="primary-time">--:--:--</div>
          <div id="kst-date" class="primary-date">날짜를 불러오는 중입니다</div>
          <div class="panel-chip">기준 시간대: Asia/Seoul</div>
        </section>
      </header>

      <main>
        <section class="info-bar" aria-label="설명">
          <article class="info-card">
            <strong>실시간 반영</strong>
            <span>브라우저에서 1초마다 자동 갱신됩니다.</span>
          </article>
          <article class="info-card">
            <strong>보기 방식</strong>
            <span>각 나라의 현지 시간과 한국 대비 시차를 함께 보여줍니다.</span>
          </article>
          <article class="info-card">
            <strong>호주 기준</strong>
            <span>호주는 시드니 시간을 기준으로 표시합니다.</span>
          </article>
        </section>

        <section id="clock-grid" class="clock-grid" aria-label="국가별 현재 시간"></section>
      </main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
