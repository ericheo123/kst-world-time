<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한국 기준 세계 시간</title>
    <meta
      name="description"
      content="한국 시간을 기준으로 베트남, 호주, 스웨덴, 사우디아라비아, 콜롬비아, 이집트의 현재 시간을 실시간으로 확인하세요."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">KST World Clock</p>
          <h1>한국 시간 대비<br />주요 국가 현재 시간</h1>
          <p class="hero-text">
            서울 시간을 기준으로 다른 나라가 얼마나 빠르거나 느린지, 지금 현지 시간이 몇 시인지
            한 화면에서 확인할 수 있습니다.
          </p>
        </div>

        <section class="kst-panel" aria-label="한국 현재 시간">
          <p class="panel-label">대한민국 서울</p>
          <div id="kst-time" class="primary-time">--:--:--</div>
          <div id="kst-date" class="primary-date">날짜를 불러오는 중입니다</div>
          <div class="panel-chip">기준 시간대 · Asia/Seoul</div>
        </section>
      </header>

      <main>
        <section class="info-bar" aria-label="설명">
          <div>
            <strong>실시간 반영</strong>
            <span>브라우저에서 1초마다 자동 갱신됩니다.</span>
          </div>
          <div>
            <strong>호주 안내</strong>
            <span>호주는 시드니 시간을 기준으로 표시합니다.</span>
          </div>
        </section>

        <section id="clock-grid" class="clock-grid" aria-label="국가별 현재 시간"></section>
      </main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
